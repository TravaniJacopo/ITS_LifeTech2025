<div class="row">
  <div class="col">
    <h2>Lista: {{ lista.length }} elementi</h2>
    @for (item of lista; track $index) {
      <div class="row">
        <div class="col border border-dark p-3 m-3">
          <p>
            <b>Voto: {{ item.voto }}⭐</b>
          </p>
          <p>{{ item.descrizione }}</p>
          <p class="fst-italic">di {{ item.nome }}</p>
          <br />
        </div>
      </div>
    }
  </div>
</div>
