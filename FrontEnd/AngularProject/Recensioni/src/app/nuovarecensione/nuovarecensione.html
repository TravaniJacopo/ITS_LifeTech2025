<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="border rounded p-4 bg-light">
        <h3 class="mb-4">Inserisci una nuova recensione</h3>

        <!-- voto -->
        <div class="mb-3">
          <label class="form-label">Voto</label>

          <div class="d-flex gap-3">
            <div>
              <input type="radio" name="voto" [(ngModel)]="voto" [value]="1" />
              1⭐
            </div>

            <div>
              <input type="radio" name="voto" [(ngModel)]="voto" [value]="2" />
              2⭐
            </div>

            <div>
              <input type="radio" name="voto" [(ngModel)]="voto" [value]="3" />
              3⭐
            </div>

            <div>
              <input type="radio" name="voto" [(ngModel)]="voto" [value]="4" />
              4⭐
            </div>

            <div>
              <input type="radio" name="voto" [(ngModel)]="voto" [value]="5" />
              5⭐
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Descrizione</label>

          <textarea class="form-control" rows="3" [(ngModel)]="descrizione"> </textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Nome</label>

          <input type="text" class="form-control" [(ngModel)]="nome" />
        </div>

        <button class="btn btn-primary" (click)="addElemento()">AGGIUNGI</button>
      </div>
    </div>
  </div>
</div>
