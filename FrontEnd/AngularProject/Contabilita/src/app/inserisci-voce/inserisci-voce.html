<div class="row">
    <div class="col">

            <div>
              <input type="radio" name="voto" [(ngModel)]="flag" [value]="true" />
              ENTRATA
            </div>

            <div>
              <input type="radio" name="voto" [(ngModel)]="flag" [value]="false" />
              USCITA
            </div>


            <label for="desc">Descrizione</label>
            <input type="text" id="desc" [(ngModel)]="descrizione" placeholder="Es.Stipendio" />

            <label for="importo">Importo</label>
            <input type="number" id="importo" [(ngModel)]="importo" min="0"  placeholder="0.00"/>


            <button type="button" (click)="addElemento()">AGGIUNGI</button>
    </div>

    </div>
